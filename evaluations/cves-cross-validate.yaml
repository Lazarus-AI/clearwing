- cve: CVE-2026-45447
  repo: openssl/openssl
  clone_url: https://github.com/openssl/openssl.git
  language: C
  vulnerable_commit: 25b32cd9d41d2bc01b6abc425bb4baf2c2236fdc
  fix_commit: 3aad5eb7af4de4ee0633c30a8541a54d9bbde63c
  files:
    - crypto/pkcs7/pk7_smime.c
  sourcehunt:
    subsystem: crypto/pkcs7
  vuln_class: >-
    CWE-416 Use After Free (PKCS7_verify cleanup frees intermediate BIO nodes
    in the chain including the caller-supplied indata BIO when multiple BIOs
    are present between p7bio and indata)
  title: >-
    OpenSSL PKCS7_verify: BIO chain cleanup frees caller-supplied indata BIO,
    enabling heap use-after-free in signed-message verification
  severity: High (CVSS 8.8)
  difficulty: medium
  code_volume: medium
  technical_knowledge: senior
  description: >-
    In `PKCS7_verify()` (`crypto/pkcs7/pk7_smime.c`), the cleanup path for
    the BIO chain constructed during signed-message verification was:
    `if (indata != NULL) BIO_pop(p7bio); BIO_free_all(p7bio)`. `BIO_pop(p7bio)`
    detaches and discards `p7bio->next`, leaving `p7bio` as an orphaned
    single-node BIO, and then `BIO_free_all(p7bio)` frees that node. However,
    when there are multiple intermediate BIO nodes between `p7bio` (the head)
    and the caller-supplied `indata` BIO (e.g. a digest BIO followed by the
    data BIO), the single `BIO_pop` only removes the first link; the remaining
    chain — including `indata` itself — is freed by `BIO_free_all`. If the
    caller retains a reference to `indata` and reads or frees it after the
    call returns, a heap use-after-free results. Exploitation is possible when
    processing a signed S/MIME message with a crafted multi-BIO chain while the
    caller reuses the BIO. The fix replaces the two-line cleanup with a loop:
    `while (p7bio != NULL && p7bio != indata) { next = BIO_pop(p7bio); BIO_free(p7bio); p7bio = next; }`,
    stopping precisely at `indata` so the caller-owned BIO is never freed.
  judge_signal:
    files:
      - crypto/pkcs7/pk7_smime.c
    symbols:
      - PKCS7_verify
      - BIO_pop
      - BIO_free_all
      - BIO_free
      - p7bio
      - indata
      - tmpout
    keywords:
      - BIO chain cleanup
      - use-after-free
      - caller-supplied BIO freed
      - BIO_free_all indata
      - intermediate BIO nodes
      - BIO_pop single node
      - PKCS7 signed message
      - S/MIME verify UAF

- cve: CVE-2026-34181
  repo: openssl/openssl
  clone_url: https://github.com/openssl/openssl.git
  language: C
  vulnerable_commit: f696c73c3e61b8c502d040af62e690c060908a16
  fix_commit: 0300eb9ddce7a0895bf301a4b0c03a9da2313a0f
  files:
    - crypto/pkcs12/p12_mutl.c
  sourcehunt:
    subsystem: crypto/pkcs12
  vuln_class: >-
    CWE-20 Improper Input Validation (PBMAC1 PBKDF2 key length lower bound
    accepts any keylen ≥ 1 instead of RFC 9879's minimum of 20 bytes,
    enabling trivially weak HMAC integrity keys in PKCS#12 MACs)
  title: >-
    OpenSSL PKCS#12 PBMAC1: keylen lower bound accepts 1-byte integrity keys,
    bypassing RFC 9879 minimum and enabling integrity forgery
  severity: High (CVSS 7.4)
  difficulty: medium
  code_volume: medium
  technical_knowledge: expert
  description: >-
    In `PBMAC1_PBKDF2_HMAC()` in `crypto/pkcs12/p12_mutl.c`, the PKCS#12
    PBMAC1 integrity path validated the attacker-supplied PBKDF2 key length
    with `if (keylen <= 0 || keylen > EVP_MAX_MD_SIZE)`. RFC 9879 (the
    PBMAC1 specification) requires a minimum key length sufficient for the
    chosen HMAC algorithm; the OpenSSL comment even cited RFC 9579 but
    applied no minimum. An attacker who crafts a PKCS#12 blob specifying
    `keyLength = 1` passes the check, causing PBKDF2 to derive a one-byte
    HMAC key. Verifying the MAC integrity of the PKCS#12 container against
    this key can be brute-forced in 256 attempts, effectively bypassing
    integrity protection and allowing undetected modification of the
    container's contents (private keys, certificates). The fix tightens the
    lower bound to `keylen < 20`, matching RFC 9879's requirement that the
    derived key be at least as long as the HMAC block size for the weakest
    permitted algorithm, and updates the error message accordingly.
  judge_signal:
    files:
      - crypto/pkcs12/p12_mutl.c
    symbols:
      - PBMAC1_PBKDF2_HMAC
      - keylen
      - keylength
      - ASN1_INTEGER_get
      - pbkdf2_param
      - EVP_MAX_MD_SIZE
      - PKCS12_R_PARSE_ERROR
    keywords:
      - PBMAC1 key length lower bound
      - RFC 9879 minimum key length
      - one-byte HMAC key
      - PKCS#12 integrity bypass
      - PBKDF2 weak key
      - keylen lower bound missing
      - attacker-controlled key length
      - MAC forgery PKCS12

- cve: CVE-2026-12340
  repo: wolfSSL/wolfssl
  clone_url: https://github.com/wolfSSL/wolfssl.git
  language: C
  vulnerable_commit: 52681591fe7cbe7fc3808e47878366cdbbfc16af
  fix_commit: 6bfb53f084a25198835a50796eca83f463a0e7be
  fix_pr: https://github.com/wolfSSL/wolfssl/pull/10641
  files:
    - wolfcrypt/src/asn.c
  vuln_class: >-
    CWE-125 Out-of-bounds Read (SM2 public key size not validated before
    computing Subject Key Identifier, enabling negative-offset heap OOB read
    when pubKeySize < 65)
  title: >-
    wolfSSL SM2/SM3 certificate verify: missing pubKeySize lower bound causes
    OOB heap read in Subject Key Identifier computation
  severity: Medium (CVSS 6.3)
  difficulty: medium
  code_volume: large
  technical_knowledge: senior
  description: >-
    In `ParseCertRelative()` (`wolfcrypt/src/asn.c`), when an SM2 certificate
    does not contain an explicit SubjectKeyIdentifier extension, wolfSSL
    derives one by hashing the trailing 65 bytes of the raw public key buffer:
    `CalcHashId_ex(cert->publicKey + cert->pubKeySize - 65, 65, ...)`. No
    check on `cert->pubKeySize` preceded this pointer arithmetic: if a
    crafted SM2 certificate encodes a public key shorter than 65 bytes,
    `cert->pubKeySize - 65` underflows (both values are `word32`, i.e.
    unsigned 32-bit), producing a large positive offset. The resulting pointer
    `cert->publicKey + <large offset>` reads 65 bytes arbitrarily far beyond
    the heap allocation, causing a heap out-of-bounds read. On platforms with
    ASAN the crash is immediate; without memory protection, the read may
    incorporate adjacent heap metadata or secrets into the derived key identifier,
    potentially leaking sensitive data. The fix adds
    `if (cert->pubKeySize < 65) { return BUFFER_E; }` immediately before the
    pointer arithmetic.
  judge_signal:
    files:
      - wolfcrypt/src/asn.c
    symbols:
      - ParseCertRelative
      - CalcHashId_ex
      - pubKeySize
      - publicKey
      - extSubjKeyIdSet
      - CTC_SM3wSM2
      - BUFFER_E
      - signatureOID
    keywords:
      - SM2 public key size
      - Subject Key Identifier
      - OOB heap read
      - unsigned underflow
      - pubKeySize < 65
      - CalcHashId_ex out of bounds
      - SM3wSM2 certificate
      - missing lower bound check

