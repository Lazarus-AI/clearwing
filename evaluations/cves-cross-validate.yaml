- cve: CVE-2026-6330
  repo: wolfSSL/wolfssl
  clone_url: https://github.com/wolfSSL/wolfssl.git
  language: C+asm
  vulnerable_commit: 5ad6097f15f1ac24f08406001902704d8d1405d2
  fix_commit: 0a00b47c75d86d691bdb77775040fc4746ace545
  fix_pr: https://github.com/wolfSSL/wolfssl/pull/10192
  files:
    - wolfcrypt/src/port/arm/armv8-mlkem-asm.S
    - wolfcrypt/src/port/arm/armv8-mlkem-asm_c.c
  sourcehunt:
    subsystem: wolfcrypt/src/port/arm
  vuln_class: >-
    CWE-697 Incorrect Comparison (ARM64 NEON final reduction in constant-time
    ML-KEM ciphertext comparison uses ins instead of ext, leaving the upper
    64-bit lane undetected and breaking decapsulation correctness)
  title: >-
    wolfSSL ML-KEM ARM64 NEON: ciphertext comparison reduction misses upper
    64 bits, breaking implicit rejection in decapsulation
  severity: Medium (CVSS 6.3)
  difficulty: hard
  code_volume: medium
  technical_knowledge: expert
  description: >-
    ML-KEM (CRYSTALS-Kyber) decapsulation requires a constant-time comparison
    of the received ciphertext `ct` against a re-encrypted ciphertext `ct'`
    derived from the candidate plaintext. If they differ, a random key is
    returned (implicit rejection) to prevent chosen-ciphertext attacks.
    wolfSSL's ARM64 NEON implementation (`mlkem_aarch64_cmp_neon` in
    `armv8-mlkem-asm.S`) OR-reduces all 16-byte comparison blocks into a
    single vector register `v8`, then executes:
    `ins v9.b[0], v8.b[1]; orr v8.16b, v8.16b, v9.16b; mov x0, v8.d[0]`.
    `ins v9.b[0], v8.b[1]` copies only byte 1 of `v8` into byte 0 of `v9`
    (other bytes of `v9` are zero). The subsequent `orr` therefore only folds
    byte 1 into byte 0 of `v8`; bytes 8–15 (the upper 64-bit lane) of `v8`
    are never ORed into the lower 64-bit lane returned via `v8.d[0]`.
    Consequently, if two ciphertexts differ exclusively in bytes 8–15 of any
    compared block, the function returns 0 (match) instead of non-zero
    (mismatch), and decapsulation produces the wrong shared secret without
    triggering implicit rejection. An adversary can use this to distinguish
    correct from incorrect decapsulation results for certain ciphertext
    positions, potentially mounting a partial chosen-ciphertext attack on the
    ARM64 NEON path. The fix replaces `ins v9.b[0], v8.b[1]` with
    `ext v9.16b, v8.16b, v8.16b, #8`, which rotates `v8` by 8 bytes so
    the upper lane is correctly folded into the lower lane before the final OR.
  judge_signal:
    files:
      - wolfcrypt/src/port/arm/armv8-mlkem-asm.S
      - wolfcrypt/src/port/arm/armv8-mlkem-asm_c.c
    symbols:
      - mlkem_aarch64_cmp_neon
      - L_mlkem_aarch64_cmp_neon_done
    keywords:
      - ML-KEM ARM64 NEON
      - constant-time comparison
      - implicit rejection
      - ins vs ext instruction
      - upper 64-bit lane missed
      - decapsulation oracle
      - NEON vector reduction
      - chosen-ciphertext attack
      - armv8-mlkem-asm

- cve: CVE-2026-7531
  repo: wolfSSL/wolfssl
  clone_url: https://github.com/wolfSSL/wolfssl.git
  language: C
  vulnerable_commit: 3181e2bcf89d4e169c14f664c4408b3d56c88c8f
  fix_commit: e37118bdfb5bf8f3c664c4114c52dbdfd1cd32ed
  fix_pr: https://github.com/wolfSSL/wolfssl/pull/10327
  files:
    - src/tls.c
  sourcehunt:
    subsystem: src
  vuln_class: >-
    CWE-416 Use After Free (ecc_kse->key aliased to keyShareEntry->key then
    conditionally freed inside HAVE_LIBOQS block; unconditional re-sync after
    the block leaves keyShareEntry->key pointing at freed memory on error paths)
  title: >-
    wolfSSL TLS 1.3 PQC hybrid key-share: UAF/double-free in
    TLSX_KeyShare_ProcessPqcHybridClient on error path
  severity: Low (CVSS 2.3)
  difficulty: hard
  code_volume: large
  technical_knowledge: expert
  description: >-
    In `TLSX_KeyShare_ProcessPqcHybridClient()` (`src/tls.c`), wolfSSL
    processes hybrid PQC+ECC key shares for TLS 1.3. An ECC `KeyShareEntry`
    (`ecc_kse`) is aliased to the outer `keyShareEntry->key` before the inner
    ECC/PQC `Process*_ex` call. In LIBOQS builds, on the success path, the
    `#ifdef HAVE_LIBOQS` block nulls `ecc_kse->key` and `pqc_kse->privKey`
    (preventing double-free). On error paths (inner process returned non-zero),
    the LIBOQS block's `if (ret == 0)` guard is false — the keys are not
    cleared there. However, if the inner process function ran its own cleanup
    before returning an error (setting `ecc_kse->key = NULL` after freeing it),
    the subsequent unconditional `keyShareEntry->key = ecc_kse->key;
    ecc_kse->key = NULL;` lines outside the `#ifdef` block would set
    `keyShareEntry->key` to the already-freed pointer. When
    `TLSX_KeyShare_FreeAll` later frees `keyShareEntry->key`, it dereferences
    and frees the dangling pointer, causing a heap use-after-free or
    double-free. The fix restructures the re-sync into an `else` branch of the
    LIBOQS block, so `keyShareEntry->key = ecc_kse->key` only executes in
    non-LIBOQS builds or in LIBOQS builds when `ret != 0`, correctly mirroring
    whatever the inner process left in `ecc_kse->key`.
  judge_signal:
    files:
      - src/tls.c
    symbols:
      - TLSX_KeyShare_ProcessPqcHybridClient
      - TLSX_KeyShare_FreeAll
      - ecc_kse
      - pqc_kse
      - keyShareEntry
      - HAVE_LIBOQS
      - Process_ex
    keywords:
      - PQC hybrid key share
      - use-after-free
      - HAVE_LIBOQS error path
      - ecc_kse key alias
      - keyShareEntry dangling pointer
      - double-free
      - TLS 1.3 key share
      - conditional cleanup bypass

- cve: CVE-2026-46349
  repo: mastodon/mastodon
  clone_url: https://github.com/mastodon/mastodon.git
  language: Ruby
  vulnerable_commit: 2e486d29b5650e16c9936a7afa9ee2068d4b02f5
  fix_commit: 0ec9ef12d585367ce6b56e328f68d8418df9ed05
  files:
    - app/lib/activitypub/linked_data_signature.rb
    - app/helpers/json_ld_helper.rb
  sourcehunt:
    subsystem: app/lib/activitypub
  vuln_class: >-
    CWE-347 Improper Verification of Cryptographic Signature (LD-Sig
    verification extracts creator and signature fields from raw JSON without
    JSON-LD compaction, allowing context-confusion attacks where a different
    creator URI is used for key lookup than was included in the signed options hash)
  title: >-
    Mastodon LinkedDataSignature: signature fields extracted pre-normalization
    enabling JSON-LD context-confusion forgery on incoming ActivityPub activities
  severity: Medium (CVSS 5.3)
  difficulty: hard
  code_volume: small
  technical_knowledge: expert
  description: >-
    Mastodon's `LinkedDataSignature#verify_actor!`
    (`app/lib/activitypub/linked_data_signature.rb`) verifies RsaSignature2017
    Linked Data Signatures on incoming ActivityPub activities. Before the fix,
    `type`, `creator_uri`, and `signatureValue` were read directly from the raw
    `@json['signature']` hash (un-normalized JSON), while the options hash was
    computed by calling `hash(@json['signature'].without(...).merge('@context' => CONTEXT))`,
    which implicitly applies JSON-LD compaction via context resolution. A
    malicious actor could craft an activity whose `signature` block uses full
    IRI keys (e.g. `"https://w3id.org/security#creator"` instead of `"creator"`)
    or additional JSON-LD `@context` overrides that alter how properties expand.
    In that case, the raw extraction would yield the attacker-controlled IRI as
    `creator_uri` (triggering a key fetch from a malicious server), while
    `hash()` would normalize the block and commit to a different canonical
    creator — effectively decoupling the key used for verification from the
    key included in the signed data. Additionally, there was no `expires` check,
    allowing indefinite replay of any captured valid signature. The fix runs
    `compact(@json['signature'].merge('@context' => CONTEXT), CONTEXT)` first
    and extracts all fields from the compacted (normalized) representation,
    ensuring the creator URI used for key lookup matches the one that was
    hashed when the signature was produced. The fix also adds
    `return if signature_options['expires']&.to_datetime&.past?` to reject
    expired signatures.
  judge_signal:
    files:
      - app/lib/activitypub/linked_data_signature.rb
      - app/helpers/json_ld_helper.rb
    symbols:
      - verify_actor!
      - compact
      - hash
      - signature_options
      - creator_uri
      - options_hash
      - document_hash
      - RsaSignature2017
    keywords:
      - JSON-LD compaction
      - context confusion
      - creator URI mismatch
      - raw JSON extraction
      - linked data signature
      - normalization bypass
      - ActivityPub signature forgery
      - expires replay
      - options hash mismatch
