- cve: CVE-2026-6331
  repo: wolfSSL/wolfssl
  clone_url: https://github.com/wolfSSL/wolfssl.git
  language: C
  vulnerable_commit: 5ad6097f15f1ac24f08406001902704d8d1405d2
  fix_commit: 0749f20c33516897d8c5e2ab083b855e2d17d665
  fix_pr: https://github.com/wolfSSL/wolfssl/pull/10192
  files:
    - wolfcrypt/src/evp.c
  vuln_class: >-
    CWE-347 Improper Verification of Cryptographic Signature (HMAC tag length
    check permits siglen=0 and any truncated length ≤ hashLen, enabling
    zero-length universal forgery in wolfSSL_EVP_DigestVerifyFinal)
  title: >-
    wolfSSL EVP_DigestVerifyFinal: zero-length HMAC tag accepted as valid,
    enabling universal MAC forgery
  severity: Low (CVSS 2.1)
  difficulty: easy
  code_volume: large
  technical_knowledge: senior
  description: >-
    In wolfSSL's OpenSSL-compatibility EVP layer, `wolfSSL_EVP_DigestVerifyFinal`
    in `wolfcrypt/src/evp.c` validated the supplied signature length with the
    guard `if (siglen > hashLen || siglen > INT_MAX)`. Because `siglen = 0`
    satisfies neither condition, an attacker who controls the `siglen` argument
    (or any caller that passes a zero-length buffer) could bypass all MAC
    comparison: the subsequent `wolfssl_evp_digest_pk_final` path was reached
    regardless of whether the presented bytes matched the computed HMAC. Beyond
    zero-length forgery, the same check allowed arbitrarily truncated signatures
    (e.g. siglen=1), reducing effective HMAC security to a brute-force of 2^8
    bits. The fix replaces the check with `if (hashLen == 0 || siglen != hashLen)`,
    requiring an exact-length match and rejecting any truncation.
  judge_signal:
    files:
      - wolfcrypt/src/evp.c
    symbols:
      - wolfSSL_EVP_DigestVerifyFinal
      - wolfssl_evp_digest_pk_final
      - wolfssl_mac_len
      - hashLen
      - siglen
    keywords:
      - zero-length HMAC tag
      - truncated signature accepted
      - exact tag length required
      - siglen != hashLen
      - EVP_DigestVerifyFinal
      - MAC forgery bypass
      - truncated HMAC

- cve: CVE-2026-40510
  repo: OpenSC/OpenSC
  clone_url: https://github.com/OpenSC/OpenSC.git
  language: C
  vulnerable_commit: 6afc34a6675ea05662a2d0b1b1c84395cbc4a5e8
  fix_commit: 33ab343a5c7d80db8cbc17d26f0edbe9dcdae299
  files:
    - src/libopensc/card-piv.c
  sourcehunt:
    subsystem: src/libopensc
  vuln_class: >-
    CWE-121 Stack-based Buffer Overflow (attacker-controlled ASN.1 TLV length
    in PIV History object URL causes size_t underflow in sc_get_cache_dir
    limit argument, overrunning the stack filename buffer)
  title: >-
    OpenSC piv_process_history(): missing URL length bound enables stack
    buffer overflow via crafted PIV History object
  severity: Low (CVSS 1.0 — AV:P per CNA)
  difficulty: easy
  code_volume: medium
  technical_knowledge: senior
  description: >-
    In OpenSC's PIV card driver, `piv_process_history()` in
    `src/libopensc/card-piv.c` parses the History object from a PIV card
    to locate an off-card certificate URL (ASN.1 tag 0xF3). After extracting
    the URL, the code locates the filename component (the SHA-256 hex suffix
    after the last `/`) as `fp`, then calls
    `sc_get_cache_dir(card->ctx, filename, sizeof(filename) - strlen(fp) - 2)`
    where `filename` is a fixed-size stack buffer. No check on `urllen`
    preceded this path: if a crafted card supplies a URL of 119 or more bytes,
    `strlen(fp)` can be large enough that `sizeof(filename) - strlen(fp) - 2`
    wraps (unsigned underflow) to a near-`SIZE_MAX` value, and
    `sc_get_cache_dir` writes far beyond the stack allocation. A second missing
    guard — no check that the SHA-256 hex segment was exactly 64 characters —
    would also accept malformed filenames. The fix adds
    `if (urllen > 118) { r = SC_ERROR_INVALID_ASN1_OBJECT; goto err; }` before
    the first use of the URL, and `if (strlen(fp) != 64) { r = SC_ERROR_INVALID_DATA; goto err; }` after the slash search, preventing both overflow paths.
  judge_signal:
    files:
      - src/libopensc/card-piv.c
    symbols:
      - piv_process_history
      - sc_get_cache_dir
      - offCardCertURL
      - urllen
      - sc_asn1_find_tag
      - SC_ERROR_INVALID_ASN1_OBJECT
      - SC_ERROR_INVALID_DATA
    keywords:
      - stack buffer overflow
      - PIV History object
      - URL length missing bound
      - size_t underflow
      - off-card certificate URL
      - SHA-256 hex filename
      - ASN.1 TLV length unchecked
      - sc_get_cache_dir overflow

- cve: CVE-2026-45446
  repo: openssl/openssl
  clone_url: https://github.com/openssl/openssl.git
  language: C
  vulnerable_commit: 843c9b94ca9c2ed248bb30127bb4f3d7af0d607c
  fix_commit: 25b32cd9d41d2bc01b6abc425bb4baf2c2236fdc
  files:
    - providers/implementations/ciphers/cipher_aes_gcm_siv_hw.c
    - providers/implementations/ciphers/cipher_aes_siv.c
  sourcehunt:
    subsystem: providers/implementations/ciphers
  vuln_class: >-
    CWE-354 Improper Validation of Integrity Check Value (GCM-SIV finish
    never triggers decryption on AAD-only paths, allowing all-zero tag to
    verify without invoking CRYPTO_memcmp; SIV finish leaks stale final_ret
    across context reuse)
  title: >-
    OpenSSL AES-GCM-SIV / AES-SIV: AEAD tag verification skipped on
    empty-ciphertext and stale-context paths enabling forgery
  severity: Medium (CVSS 4.8)
  difficulty: easy
  code_volume: medium
  technical_knowledge: expert
  description: >-
    Two related authentication-bypass flaws in OpenSSL's AES-SIV family.
    (1) AES-GCM-SIV: `aes_gcm_siv_finish()` in
    `cipher_aes_gcm_siv_hw.c` called `CRYPTO_memcmp(ctx->tag, ctx->user_tag, ...)`
    immediately, but `ctx->tag` is only populated by `aes_gcm_siv_decrypt()`.
    If a caller processes only AAD without any ciphertext Update, decryption
    is never called, `ctx->tag` remains all-zeros, and an attacker who
    presents an all-zero user tag passes `CRYPTO_memcmp` without any
    cryptographic check, constituting a universal forgery for any
    (key, nonce, AAD, empty-plaintext) tuple. (2) AES-SIV:
    `aes_siv_set_ctx_params()` in `cipher_aes_siv.c` did not reset
    `sctx->final_ret` when reinitialising an existing context with key=NULL.
    A successful decryption leaves `final_ret = 0`; a subsequent reinit and
    forged decrypt reuses that stale success value, bypassing tag comparison.
    Fix (1) moves `aes_gcm_siv_finish()` after decryption and adds
    `if (!ctx->generated_tag) aes_gcm_siv_decrypt(ctx, NULL, NULL, 0)` to
    force tag generation even for empty ciphertext. Fix (2) adds
    `sctx->final_ret = -1` in the params setter.
  judge_signal:
    files:
      - providers/implementations/ciphers/cipher_aes_gcm_siv_hw.c
      - providers/implementations/ciphers/cipher_aes_siv.c
    symbols:
      - aes_gcm_siv_finish
      - aes_gcm_siv_decrypt
      - aes_siv_set_ctx_params
      - generated_tag
      - final_ret
      - CRYPTO_memcmp
      - have_user_tag
      - PROV_AES_GCM_SIV_CTX
    keywords:
      - AAD-only path
      - empty ciphertext forgery
      - tag never computed
      - all-zero tag bypass
      - stale final_ret
      - context reuse
      - GCM-SIV authentication bypass
      - SIV AEAD integrity skip

