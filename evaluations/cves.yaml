  vuln_class: >-
    CWE-79 Improper Neutralization of Input During Web Page Generation (namespace attribute
    values written unencoded during HTML serialization bypass XSS sanitizer)
  title: >-
    typo3/html-sanitizer: XSS bypass via unencoded namespace attribute values in HTML serialization
  severity: Medium
  difficulty: easy
  description: >-
    TYPO3's html-sanitizer extends Masterminds\HTML5\Serializer\OutputRules with a custom
    Rules class (src/Serializer/Rules.php) that overrides attribute encoding to properly escape
    HTML entities. However, it did not override the inherited namespaceAttrs() method from the
    parent library. The parent's namespaceAttrs() writes namespace attribute values (xmlns:*)
    directly via $this->wr($nsNode->nodeValue) without encoding, while all other attributes
    pass through $this->enc() for HTML entity escaping. An attacker can craft an element with
    a namespace declaration like xmlns:x="&quot;&gt;&lt;img src=x onerror=alert(1)&gt;" — the
    HTML parser decodes the entities on input, and on re-serialization the raw characters
    (quotes, angle brackets) are emitted unescaped into the output HTML, breaking out of the
    attribute context and injecting arbitrary HTML/JavaScript. The fix adds an #[\Override] of
    namespaceAttrs() in the Rules class that passes namespace values through $this->enc($nsNode->nodeValue, true),
