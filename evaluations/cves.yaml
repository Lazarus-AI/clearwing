  fix_pr: https://github.com/wolfSSL/wolfssl/pull/10131
  files:
    - wolfcrypt/src/ecc.c
    - wolfcrypt/src/asn.c
  vuln_class: >-
    CWE-295 Improper Certificate Validation (missing lower-bound hash size and
    signature OID/key-type cross-check before ECDSA verify)
  title: >-
    wolfSSL: ECDSA sign/verify accepts undersized digests and mismatched hash
    OIDs via missing WC_MIN_DIGEST_SIZE / SigOidMatchesKeyOid checks
  severity: "Critical (CVSS 4.0: 9.3 / CVSS 3.1: 9.1)"
  difficulty: medium
  description: >-
    wolfSSL's ECDSA sign and verify entry points (`wc_ecc_sign_hash`,
    `wc_ecc_sign_hash_ex`, `wc_ecc_verify_hash`, `wc_ecc_verify_hash_ex` in
    `wolfcrypt/src/ecc.c`) enforced only an upper-bound check
    (`hashlen > WC_MAX_DIGEST_SIZE`) on the supplied digest length, never a
    lower bound. A caller could therefore pass a digest shorter than the
    minimum acceptable for the key size — including a digest from a weak or
    truncated algorithm — without being rejected. Compounding this,
    `wolfcrypt/src/asn.c` lacked any cross-check between the certificate's
    signatureAlgorithm OID and the issuer's key type OID, so an ECDSA key
    could be paired with an EdDSA or ML-DSA signature OID when those families
    were also compiled in. An attacker who knows the public CA key can craft a
    certificate whose signature is computed over a truncated or weak digest,
    reducing the effective security of ECDSA verification to whatever the
    undersized digest provides. The fix introduces `WC_MIN_DIGEST_SIZE`
    (defined in `wolfssl/wolfcrypt/hash.h`, defaulting to the smallest enabled
    hash's output), adds symmetric lower-bound guards in all four ECC
    sign/verify entry points, and adds a new `SigOidMatchesKeyOid()` helper in
    `asn.c` that rejects any signature OID incompatible with the issuer key OID
    during certificate chain verification.
  judge_signal:
    files:
      - wolfcrypt/src/ecc.c
      - wolfcrypt/src/asn.c
      - wolfssl/wolfcrypt/hash.h
    symbols:
