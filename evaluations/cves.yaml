- cve: CVE-2026-45445
  repo: openssl/openssl
  clone_url: https://github.com/openssl/openssl.git
  language: C
  vulnerable_commit: ffce42f4807d879586bd3bba8fa93caf13a7b8e4
  fix_commit: 843c9b94ca9c2ed248bb30127bb4f3d7af0d607c
  files:
    - providers/implementations/ciphers/cipher_aes_ocb.c
  vuln_class: >-
    CWE-325 Missing Required Cryptographic Step (application-supplied IV never
    applied to OCB context on the EVP_Cipher() one-shot path)
  title: >-
    OpenSSL AES-OCB: EVP_Cipher() one-shot path discards IV, enabling
    nonce reuse and authentication tag forgery
  severity: High (CVSS 7.5 — AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:N/A:N)
  difficulty: easy
  description: >-
    In OpenSSL's AES-OCB provider, the one-shot cipher handler aes_ocb_cipher()
    — dispatched via OSSL_FUNC_CIPHER_CIPHER / EVP_Cipher() — called
    aes_generic_ocb_cipher() directly without first invoking update_iv() to
    push the caller-supplied IV into the OCB context. The streaming handlers
    (EVP_CipherUpdate / EVP_CipherFinal_ex) correctly call update_iv() before
    processing data; the one-shot handler did not. As a result, every
    EVP_Cipher() call on an AES-OCB context ran with the all-zero Offset_0
    state left by cipher initialisation regardless of the IV supplied during
    EVP_CipherInit_ex(), causing catastrophic (key, nonce) reuse: any two
    messages encrypted with the same key but different IVs produce identical
    keystreams. Additionally, if EVP_EncryptFinal_ex() is subsequently called
    to obtain the authentication tag, the deferred update_iv() fires at that
    point and clears the accumulated OCB checksum, yielding a tag that is a
    function of (key, IV) only — allowing universal forgery of arbitrary
    ciphertext under the same key. The fix adds the missing
    !ctx->key_set || !update_iv(ctx) guard at the top of aes_ocb_cipher(),
    mirroring the check already present in the streaming path.
  judge_signal:
    files:
      - providers/implementations/ciphers/cipher_aes_ocb.c
    symbols:
      - aes_ocb_cipher
      - update_iv
      - aes_generic_ocb_cipher
      - key_set
      - PROV_AES_OCB_CTX
      - OSSL_FUNC_CIPHER_CIPHER
      - CRYPTO_ocb128_encrypt
      - EVP_Cipher
    keywords:
      - nonce reuse
      - IV discarded
      - one-shot path
      - OCB Offset_0
      - authentication tag forgery
      - streaming vs one-shot dispatch
      - AEAD integrity bypass
      - EVP_Cipher one-shot

- cve: CVE-2026-47345
  repo: TYPO3/html-sanitizer
  clone_url: https://github.com/TYPO3/html-sanitizer.git
  language: PHP
  vulnerable_commit: bd1a88d9b5a5f67f1120ec41084e9c1a0675641c
  fix_commit: 8b5d0be44ded457ca993ec9ca93d859941c63764
  files:
    - src/Serializer/Rules.php
  vuln_class: >-
    CWE-79 Improper Neutralization of Input During Web Page Generation (namespace attribute
    values written unencoded during HTML serialization bypass XSS sanitizer)
  title: >-
    typo3/html-sanitizer: XSS bypass via unencoded namespace attribute values in HTML serialization
  severity: Medium
  difficulty: easy
  description: >-
    TYPO3's html-sanitizer extends Masterminds\HTML5\Serializer\OutputRules with a custom
    Rules class (src/Serializer/Rules.php) that overrides attribute encoding to properly escape
    HTML entities. However, it did not override the inherited namespaceAttrs() method from the
    parent library. The parent's namespaceAttrs() writes namespace attribute values (xmlns:*)
    directly via $this->wr($nsNode->nodeValue) without encoding, while all other attributes
    pass through $this->enc() for HTML entity escaping. An attacker can craft an element with
    a namespace declaration like xmlns:x="&quot;&gt;&lt;img src=x onerror=alert(1)&gt;" — the
    HTML parser decodes the entities on input, and on re-serialization the raw characters
    (quotes, angle brackets) are emitted unescaped into the output HTML, breaking out of the
    attribute context and injecting arbitrary HTML/JavaScript. The fix adds an #[\Override] of
    namespaceAttrs() in the Rules class that passes namespace values through $this->enc($nsNode->nodeValue, true),
    applying the same htmlspecialchars() encoding used for regular attributes.
  judge_signal:
    files:
      - src/Serializer/Rules.php
    symbols:
      - namespaceAttrs
      - enc
      - OutputRules
      - wr
      - implicitNamespaces
      - htmlspecialchars
    keywords:
      - namespace attribute
      - xmlns
      - unencoded serialization
      - XSS sanitizer bypass
      - HTML entity encoding
      - re-serialization
      - attribute context breakout
      - OutputRules inheritance

- cve: CVE-2026-28208
  repo: junrar/junrar
  clone_url: https://github.com/junrar/junrar.git
  language: Java
  vulnerable_commit: c7041fc07df2cc397ea46ba516933ee9725af250
  fix_commit: 947ff1d33f00f940aa68ae2593500291d799d954
  files:
    - src/main/java/com/github/junrar/LocalFolderExtractor.java
  vuln_class: path-traversal
  title: Junrar LocalFolderExtractor backslash path traversal.
  severity: Medium
  difficulty: easy
  description: >
    Junrar's LocalFolderExtractor performed its destination-containment check
    on the raw archive entry name without normalizing backslashes to forward
    slashes. On non-Windows hosts a crafted RAR entry containing "..\..\"
    bypassed the getCanonicalPath().startsWith(destination) guard and wrote
    files outside the target directory. Fixed by normalizing separators
    (invariantSeparatorsPathString) before the containment check and splitting
    on "/" uniformly.
  judge_signal:
    files:
      - src/main/java/com/github/junrar/LocalFolderExtractor.java
    symbols:
      - LocalFolderExtractor
      - makeFile
      - invariantSeparatorsPathString
    keywords:
      - path traversal
      - backslash
      - "..\\"
      - canonical path
      - zip slip

