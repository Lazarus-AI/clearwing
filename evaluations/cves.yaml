      - freerdp_image_copy_no_overlap
      - is_rect_valid
      - cacheEntry->width
      - cacheEntry->height
      - destPt
      - UINT16_MAX
      - rect.right - rect.left
    keywords:
      - heap-buffer-overflow
      - rectangle validation bypass
      - UINT16_MAX clamping
      - unclamped cache entry dimensions
      - RDPGFX CacheToSurface PDU
      - out-of-bounds heap write
      - gfx surface copy
      - validation mismatch

