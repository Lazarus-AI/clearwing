- cve: CVE-2026-47391
  repo: MervinPraison/PraisonAI
  clone_url: https://github.com/MervinPraison/PraisonAI.git
  language: Python
  vulnerable_commit: bc73dd1db9089ea93648c5266b2d6ad9dcf85484
  fix_commit: e0fb8e7dd1ee6759c18ed07f436c21dbd9c20747
  fix_pr: https://github.com/MervinPraison/PraisonAI/pull/1183
  files:
    - examples/python/a2a/a2a-server.py
    - examples/mcp/multi_server.py
    - examples/mcp_server/custom_tools_server.py
    - examples/python/custom_tools/tools_with_latency.py
    - examples/python/mcp/mcp-tools-server-sse.py
    - examples/python/mcp/mcp-tools-server.py
    - examples/python/mcp_server_example.py
    - examples/eval/reliability_example.py
    - src/praisonai-agents/benchmarks/real_benchmark.py
    - src/praisonai-agents/praisonai_platform/services/auth_service.py
  vuln_class: >-
    CWE-95 Improper Neutralization of Directives in Dynamically Evaluated Code ('Eval Injection'),
    reachable via CWE-306 Missing Authentication for Critical Function
  title: PraisonAI unauthenticated A2A example reaches LLM-driven eval() code execution
  severity: Critical
  difficulty: medium
  description: >-
    PraisonAI's first-party A2A server example (examples/python/a2a/a2a-server.py) registers a
    calculate(expression) tool implemented with Python eval(expression), and the A2A framework's
    serve() binds to 0.0.0.0 while /a2a authentication is disabled whenever auth_token is None. An
    unauthenticated remote client can POST a JSON-RPC message/send request to /a2a; the handler
    forwards the attacker-controlled text to agent.chat(), and the LLM invokes the calculate tool,
    whose eval() sink executes arbitrary Python in the server process. The fix replaces eval() in
    the example (and other example/benchmark files) with an AST-based safe arithmetic evaluator
    that only permits numeric literals and arithmetic operators.
  judge_signal:
    files:
      - examples/python/a2a/a2a-server.py
    symbols:
      - calculate
      - eval
      - agent.chat
      - message/send
      - A2A.serve
    keywords:
      - eval
      - eval injection
      - arbitrary code execution
      - unauthenticated
      - auth_token None
      - 0.0.0.0
      - A2A
      - calculate tool
      - AST safe evaluator

