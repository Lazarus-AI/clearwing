- cve: CVE-2026-34182
  repo: openssl/openssl
  clone_url: https://github.com/openssl/openssl.git
  language: C
  vulnerable_commit: 0300eb9ddce7a0895bf301a4b0c03a9da2313a0f
  fix_commit: 9fd97f8cfdc2c0be214998de3b2b55c8edf6c7ac
  files:
    - crypto/cms/cms_enc.c
  vuln_class: >-
    CWE-354 Improper Validation of Integrity Check Value (AEAD tag length not
    bounded and non-AEAD cipher accepted in AuthEnvelopedData decryption path)
  title: >-
    OpenSSL CMS AuthEnvelopedData: non-AEAD cipher acceptance and unbounded
    tag-length allow AEAD bypass and integrity bypass
  severity: Critical (CVSS 9.1)
  difficulty: hard
  description: >-
    In `ossl_cms_EncryptedContent_init_bio()` (`crypto/cms/cms_enc.c`), during
    CMS AuthEnvelopedData decryption the code checked only `ec->taglen > 0`
    before calling `EVP_CTRL_AEAD_SET_TAG`, placing no upper or lower bound on
    the attacker-supplied tag length. A second flaw meant that if the cipher
    OID in the container was rewritten to a non-AEAD mode (e.g. AES-256-OFB)
    the `else if (auth)` guard was absent, so OpenSSL silently accepted the
    cipher, initialized it under the legitimate CEK unwrapped from the intact
    recipientInfos, and returned success without ever consulting the MAC field —
    an on-path attacker who captures one AES-GCM message can therefore
    re-encrypt arbitrary content under the real key (decryption oracle /
    key-equivalent attack). The fix adds an `else if (auth) { ERR_raise … goto
    err; }` branch to reject non-AEAD ciphers in the auth path, and tightens
    the tag-length check to `ec->taglen < 4 || ec->taglen > 16`.
  judge_signal:
    files:
      - crypto/cms/cms_enc.c
    symbols:
      - ossl_cms_EncryptedContent_init_bio
      - CMS_EncryptedContentInfo
      - ec->taglen
      - ec->tag
      - EVP_CTRL_AEAD_SET_TAG
      - EVP_CIPH_FLAG_AEAD_CIPHER
      - CMS_R_CIPHER_AEAD_SET_TAG_ERROR
      - CMS_R_UNSUPPORTED_CONTENT_ENCRYPTION_ALGORITHM
    keywords:
      - AuthEnvelopedData
      - AEAD bypass
      - non-AEAD cipher substitution
      - tag length validation
      - AES-GCM to AES-OFB downgrade
      - decryption oracle
      - CEK unwrap
      - integrity bypass

- cve: CVE-2026-42768
  repo: openssl/openssl
  clone_url: https://github.com/openssl/openssl.git
  language: C
  vulnerable_commit: 72fecdef656deca8119dda2d87e2618fcaf7b912
  fix_commit: f04b377be3d821741c86d1f4bf84dee09f3d5c3e
  files:
    - crypto/cms/cms_env.c
    - crypto/pkcs7/pk7_doit.c
  vuln_class: >-
    CWE-514 Covert Channel (RSA PKCS#1 v1.5 implicit rejection deliberately
    disabled in CMS/PKCS7 decryption paths, creating a Bleichenbacher-style
    adaptive chosen-ciphertext oracle)
  title: >-
    OpenSSL CMS/PKCS7: Bleichenbacher-style decrypt oracle via disabled RSA
    implicit rejection
  severity: Low (CVSS 3.7 — AV:N/AC:H/PR:N/UI:N/S:U/C:L/I:N/A:N)
  difficulty: hard
  description: >-
    In OpenSSL's CMS and PKCS7 decryption paths, the functions
    cms_RecipientInfo_ktri_decrypt() (crypto/cms/cms_env.c) and
    pkcs7_decrypt_rinfo() (crypto/pkcs7/pk7_doit.c) explicitly disabled RSA
    PKCS#1 v1.5 implicit rejection via EVP_PKEY_CTX_ctrl_str(...,
    "rsa_pkcs1_implicit_rejection", "0") whenever an RSA key was in use. The
    justification in the comments was that the upper-layer code "incorrectly
    assumes a successful RSA decryption means the key matches the ciphertext,"
    but disabling implicit rejection restores the classical padding oracle: the
    operation either succeeds with valid PKCS#1 v1.5 padding or fails with a
    distinct error path. Two attack variants exist: (1) when no recipient
    certificate is supplied, CMS iterates all KeyTransRecipientInfo entries
    without stopping at the first success, letting an attacker embed a probe
    ciphertext in a second KTRI and observe whether its decryption produces
    valid padding; (2) when a certificate is supplied but the recipient is not
    found, a random key is substituted and the error/plaintext difference leaks
    padding validity. Either path constitutes a Bleichenbacher oracle from which
    the attacker can decrypt arbitrary RSA ciphertexts or forge PKCS#1 v1.5
    signatures under the victim's key. The fix removes the explicit
    rsa_pkcs1_implicit_rejection=0 override in both files, allowing the default
    implicit rejection introduced in draft-irtf-cfrg-rsa-guidance to suppress
    the oracle.
  judge_signal:
    files:
      - crypto/cms/cms_env.c
      - crypto/pkcs7/pk7_doit.c
    symbols:
      - cms_RecipientInfo_ktri_decrypt
      - pkcs7_decrypt_rinfo
      - EVP_PKEY_CTX_ctrl_str
      - rsa_pkcs1_implicit_rejection
      - evp_pkey_decrypt_alloc
      - KeyTransRecipientInfo
      - CMS_decrypt
      - PKCS7_decrypt
    keywords:
      - Bleichenbacher oracle
      - implicit rejection
      - PKCS#1 v1.5 padding oracle
      - adaptive chosen-ciphertext
      - KeyTransRecipientInfo iteration
      - RSA CEK unwrap
      - padding validity side-channel
      - draft-irtf-cfrg-rsa-guidance

- cve: CVE-2026-6679
  repo: wolfSSL/wolfssl
  clone_url: https://github.com/wolfSSL/wolfssl.git
  language: C
  vulnerable_commit: 0c9b6397be463c0e5bd7d0c8c1bd8619dc9b3aa8
  fix_commit: cece804621c454df42a12c377c17faf2b803c413
  fix_pr: https://github.com/wolfSSL/wolfssl/pull/10116
  files:
    - src/dtls13.c
  vuln_class: >-
    CWE-197 Numeric Truncation Error / CWE-787 Out-of-bounds Write
    (word16 cast of ACK record-number list length causes undersized allocation leading to heap overflow)
  title: >-
    wolfSSL DTLS 1.3 ACK pre-auth heap overflow (int trunc).
  severity: High (CVSS 7.5 / CVSS4 8.8)
  difficulty: hard
  description: >-
    In wolfSSL's DTLS 1.3 implementation, the function Dtls13WriteAckMessage computes
    the ACK message buffer size as msgSz = (word16)(DTLS13_RN_SIZE * recordsCount),
    where DTLS13_RN_SIZE is 16 bytes and recordsCount is a word16. The seenRecordsCount
    field tracking list length is itself a word16, meaning if an attacker can cause
    the linked list to grow beyond what the counter tracks (via desynchronization
    between the actual list length and the counter, particularly in WOLFSSL_RW_THREADED
    or HAVE_WRITE_DUP configurations), the multiplication can overflow the word16 cast,
    producing a truncated (undersized) msgSz. The buffer allocated based on this
    truncated size is then overrun by the write loop that iterates over the full
    linked list. An unauthenticated remote peer can trigger this pre-handshake by
    sending many DTLS records that each invoke Dtls13RtxAddAck. The fix introduces
    a hard cap (DTLS13_MAX_ACK_RECORDS, default 512) enforced by counting actual
    linked-list nodes in Dtls13RtxAddAck, independent of the seenRecordsCount field.
  judge_signal:
    files:
      - src/dtls13.c
      - wolfssl/internal.h
    symbols:
      - Dtls13RtxAddAck
      - Dtls13WriteAckMessage
      - seenRecordsCount
      - DTLS13_ACK_MAX_RECORDS
      - DTLS13_RN_SIZE
      - msgSz
      - word16
      - Dtls13RecordNumber
    keywords:
      - integer truncation
      - word16 overflow
      - ACK record-number list
      - heap buffer overflow
      - pre-authentication
      - DTLS 1.3
      - undersized buffer allocation
      - linked list cap

- cve: CVE-2026-5747
  repo: firecracker-microvm/firecracker
  clone_url: https://github.com/firecracker-microvm/firecracker.git
  language: Rust
  vulnerable_commit: 7db02adc28eaeb5f54a0d4a8c312e7e9954070b6
  fix_commit: ee7b464183a24196071e3fed5fb4cdb6b79825c5
  fix_release: https://github.com/firecracker-microvm/firecracker/releases/tag/v1.15.1
  files:
    - src/vmm/src/devices/virtio/transport/pci/common_config.rs
  vuln_class: >-
    CWE-787 Out-of-bounds Write / CWE-369 Divide By Zero (virtio PCI common
    config allows queue register writes after device activation, bypassing
    initialization-time bounds validation)
  title: >-
    Firecracker virtio-pci: post-activation queue register write bypasses
    bounds validation, enabling guest-root OOB write and VMM crash
  severity: "High (CVSS 4.0: 8.7 / CVSS 3.1: 7.5 — AV:L/AC:H/PR:H/UI:N/S:C/C:H/I:H/A:H)"
  difficulty: hard
  description: >-
    In Firecracker's virtio PCI transport (`common_config.rs`), the
    `write_common_config_word` and `write_common_config_dword` handlers passed
    QUEUE_SIZE, QUEUE_ENABLE, QUEUE_DESC_LO/HI, QUEUE_AVAIL_LO/HI, and
    QUEUE_USED_LO/HI writes directly to `with_queue_mut()` without checking
    `driver_status`. The virtio 1.3 spec requires queue configuration to occur
    only between the FEATURES_OK and DRIVER_OK status transitions; Firecracker
    validated queue_size and ring addresses during device activation but nothing
    prevented a guest-root user from modifying those registers afterwards via
    MMIO writes to the PCI common-config BAR. Reducing queue_size post-activation
    causes the VMM to process descriptors with the new (smaller) size while
    guest memory still contains rings sized for the original value, producing
    out-of-bounds writes up to 524,284 bytes beyond the virtio queue structures;
    setting queue_size to zero triggers a divide-by-zero panic in the VMM process.
    Reaching host memory (beyond guest RAM) additionally requires a custom guest
    kernel or specific snapshot configurations. The fix introduces
    `update_queue_field()`, which wraps `with_queue_mut()` behind a
    `driver_status == (ACKNOWLEDGE | DRIVER | FEATURES_OK)` guard, making all
    queue-config register writes a no-op once DRIVER_OK is set. A companion commit
    (`3e385b8a`) also enforces the full device-status state machine in
    `set_device_status()`, blocking arbitrary status register overwrites that could
    be used to re-open the configuration window.
  judge_signal:
    files:
      - src/vmm/src/devices/virtio/transport/pci/common_config.rs
    symbols:
      - write_common_config_word
      - write_common_config_dword
      - with_queue_mut
      - update_queue_field
      - set_device_status
      - driver_status
      - QUEUE_SIZE
      - VirtioPciCommonConfig
    keywords:
      - post-activation queue register write
      - virtio device status state machine
      - DRIVER_OK guard
      - FEATURES_OK to DRIVER_OK window
      - queue_size OOB write
      - divide-by-zero VMM crash
      - guest-root hypervisor escape
      - virtio PCI common config BAR

- cve: CVE-2026-5588
  repo: bcgit/bc-java
  clone_url: https://github.com/bcgit/bc-java.git
  language: Java
  vulnerable_commit: 8a471e58cf7f63bbc78862e44e42494d793e2e12
  fix_commit: 656bae0dbd9b1521f840521ff786e78749fe3057
  files:
    - pkix/src/main/java/org/bouncycastle/operator/jcajce/JcaContentVerifierProviderBuilder.java
    - pkix/src/test/java/org/bouncycastle/cert/cmp/test/AllTests.java
  vuln_class: >-
    CWE-347 Improper Verification of Cryptographic Signature (composite
    signature verifier returns success when presented with an empty signature
    sequence, performing zero cryptographic checks)
  title: >-
    Bouncy Castle bcpkix: CompositeVerifier accepts empty signature sequence,
    bypassing all cryptographic verification
  severity: "Medium (CVSS 4.0: 6.3 — primary; CVSS 3.1: 7.5 High — Red Hat secondary)"
  difficulty: medium
  description: >-
    In Bouncy Castle's PKIX library, the inner CompositeVerifier class inside
    JcaContentVerifierProviderBuilder iterates over an ASN.1 SEQUENCE of
    component signatures and returns `!failed` after the loop. Because `failed`
    is initialised to false and the loop body only executes when sigSeq.size()
    is greater than zero, an attacker who submits a composite-type signed
    artifact (e.g. a CMP PKIMessage) whose protection field wraps an empty DER
    SEQUENCE (two bytes: 30 00) causes the loop to never execute, `failed`
    stays false, and verify() returns true without performing any cryptographic
    operation whatsoever. The fix adds an `atLeastOneChecked` boolean that is
    set to true inside the loop body and changes the return expression from
    `!failed` to `!failed & atLeastOneChecked`, ensuring that an empty or
    all-null signature sequence is always rejected. Affected versions include
    BC-JAVA 1.67–1.83, BCPKIX-FIPS 2.0.6–2.1.10, and BCPKIX-LTS 2.73.7–2.73.10.
  judge_signal:
    files:
      - pkix/src/main/java/org/bouncycastle/operator/jcajce/JcaContentVerifierProviderBuilder.java
    symbols:
      - CompositeVerifier
      - CompositeVerifier.verify
      - atLeastOneChecked
      - createCompositeVerifier
      - JcaContentVerifierProviderBuilder
      - sigSeq
      - sigs
      - failed
    keywords:
      - composite signature
      - empty signature sequence
      - signature bypass
      - zero-length sigSeq
      - id_alg_composite
      - CMP PKIMessage forgery
      - atLeastOneChecked guard
      - ASN.1 empty SEQUENCE

- cve: CVE-2026-28386
  repo: openssl/openssl
  clone_url: https://github.com/openssl/openssl.git
  language: C+asm
  vulnerable_commit: 481743fb8aa2b72f0a82c4c112880c290339fa60
  fix_commit: 61f428a2fc6671ede184a19f71e6e495f0689621
  files:
    - crypto/aes/asm/aes-cfb-avx512.pl
  vuln_class: >-
    CWE-125 Out-of-bounds Read (unmasked SIMD load reads past input buffer on partial blocks)
  title: >-
    OpenSSL AES-CFB128 OOB read on AVX-512+VAES partial blocks
  severity: High (CVSS 7.5 NVD primary; Critical 9.1 secondary)
  difficulty: hard
  description: >-
    The AVX-512+VAES optimized AES-CFB128 implementation in aes-cfb-avx512.pl
    uses vmovdqu8 to load 16-byte XMM registers from the IV buffer and input
    buffer when processing partial cipher blocks (fewer than 16 bytes remaining
    from a prior incomplete block). Although a k1 opmask is computed to limit
    the number of valid bytes (based on the $left variable), the load
    instructions lack the {%k1}{z} masked-with-zeroing decorator, causing a
    full 16-byte read regardless of how many bytes are actually valid. If the
    input buffer is positioned near a page boundary with fewer than 16 bytes
    remaining before an unmapped page, this triggers a segfault / OOB read of
    up to 15 bytes. The fix adds the {%k1}{z} mask to both vmovdqu8 loads in
    both the encrypt and decrypt partial-block paths, ensuring only $left bytes
    are read and the remaining lanes are zeroed. This affects only x86-64
    systems with AVX-512 and VAES support running OpenSSL 3.6.0-3.6.1.
  judge_signal:
    files:
      - crypto/aes/asm/aes-cfb-avx512.pl
    symbols:
      - vmovdqu8
      - aes_cfb128_encrypt_avx512
      - aes_cfb128_decrypt_avx512
      - kmovq
      - k1
      - xmm0
      - xmm1
    keywords:
      - partial block
      - opmask zeroing
      - out-of-bounds read
      - AVX-512 VAES
      - page boundary segfault
      - masked load
      - CFB128 cipher feedback
      - vmovdqu8 mask decorator
